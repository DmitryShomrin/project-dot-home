---

- name: Create Postgresql data directory
  ansible.builtin.file:
    path: "{{ docker_compose_postgresql_data_dir }}"
    state: directory
    mode: '0755'
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"

- name: Template Postgresql docker-compose file
  ansible.builtin.template:
    src: templates/postgresql.yaml.j2
    dest: "{{ docker_compose_services_directory }}/{{ docker_compose_postgresql_file_name }}"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
  notify: Start/Restart Postgresql
