---

- name: Create Immich database directory
  ansible.builtin.file:
    path: "{{ docker_compose_immich_database_dir }}"
    state: directory
    mode: '0755'
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"

- name: Create Immich upload directory
  ansible.builtin.file:
    path: "{{ docker_compose_immich_upload_dir }}"
    state: directory
    mode: '0755'
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"

- name: Create Immich model cache directory
  ansible.builtin.file:
    path: "{{ docker_compose_immich_model_cache_dir }}"
    state: directory
    mode: '0755'
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"

- name: Template Immich environment file
  ansible.builtin.template:
    src: templates/env.j2
    dest: "{{ docker_compose_services_directory }}/{{ docker_compose_immich_config_file }}"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
  notify: Start/Restart Immich

- name: Template Immich docker-compose file
  ansible.builtin.template:
    src: templates/immich.yaml.j2
    dest: "{{ docker_compose_services_directory }}/{{ docker_compose_immich_file_name }}"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
  notify: Start/Restart Immich

- name: Flush handlers
  meta: flush_handlers
