# Docker Compose Services - shared defaults
docker_compose_services_directory: "{{ ansible_env.HOME }}/docker-compose-files"
docker_compose_services_config_directory: "{{ ansible_env.HOME }}/configs"
docker_compose_services_domain: "s5n.dev"
docker_compose_networks:
  - proxy
  - services

# Docker & docker compose
docker_users:
  - admin
# Docker Compose Plugin options.
docker_install_compose_plugin: true
# Docker Compose options.
docker_install_compose: false
# docker_compose_version: "v2.27.1"

# Node exporter
# node_exporter_version: 1.8.1
node_exporter_enabled_collectors:
  - systemd
  - textfile:
      directory: "{{ node_exporter_textfile_dir }}"
  - filesystem:
      ignored-mount-points: ^/(run)($|/.+)

# Traefik
docker_compose_traefik_ca_server: https://acme-v02.api.letsencrypt.org/directory

# Test variables
test_name: all
